services:
  - type: web
    name: crisisops-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://crisisops-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: crisisops-db
          property: connectionString

databases:
  - name: crisisops-db
    databaseName: crisisops
    user: crisisops
